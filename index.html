<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c8eff;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #7b82a0;
    --done: #4ade80;
    --danger: #f87171;
    --radius: 14px;
    --font: 'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .greeting {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    gap: 18px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  /* ── CLOCK ── */
  .clock-card {
    grid-column: 1;
    grid-row: 1;
    text-align: center;
    padding: 30px 22px;
  }

  #clock-time {
    font-size: 3.8rem;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  #clock-date {
    margin-top: 8px;
    font-size: 0.95rem;
    color: var(--muted);
  }

  #clock-seconds {
    display: inline-block;
    margin-top: 14px;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── CALENDAR ── */
  .calendar-card {
    grid-column: 1;
    grid-row: 2;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-header h2 {
    font-size: 1rem;
    font-weight: 600;
  }

  .cal-nav {
    display: flex;
    gap: 6px;
  }

  .cal-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .cal-nav button:hover { background: var(--border); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    text-align: center;
  }

  .cal-day-name {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cal-day {
    border-radius: 7px;
    padding: 6px 2px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cal-day:hover { background: var(--surface2); }
  .cal-day.other-month { color: var(--muted); opacity: 0.4; }
  .cal-day.today {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  /* ── TODO ── */
  .todo-card {
    grid-column: 2;
    grid-row: 1;
  }

  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 600;
  }

  .todo-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .todo-input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 13px;
    font-size: 0.9rem;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  .todo-input-row input:focus { border-color: var(--accent); }
  .todo-input-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 0.9rem;
    font-family: var(--font);
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
  }

  .btn-add:hover { opacity: 0.85; }

  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 13px;
    transition: opacity 0.2s;
  }

  .todo-item.done { opacity: 0.5; }

  .todo-item input[type="checkbox"] {
    accent-color: var(--done);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .todo-item span {
    flex: 1;
    font-size: 0.9rem;
  }

  .todo-item.done span { text-decoration: line-through; color: var(--muted); }

  .todo-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    padding: 0 2px;
  }

  .todo-item:hover .todo-del { opacity: 1; }
  .todo-del:hover { color: var(--danger); }

  /* ── NEWS ── */
  .news-card {
    grid-column: 2;
    grid-row: 2;
  }

  .news-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .news-tabs {
    display: flex;
    gap: 6px;
  }

  .news-tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .news-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 5px 11px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .news-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .news-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 14px;
    text-decoration: none;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .news-item:hover { border-color: var(--accent); }

  .news-source {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
  }

  .news-headline {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.4;
  }

  .news-time {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .news-loading {
    text-align: center;
    color: var(--muted);
    padding: 24px;
    font-size: 0.9rem;
  }

  @media (max-width: 800px) {
    .grid { grid-template-columns: 1fr; }
    .clock-card, .calendar-card, .todo-card, .news-card {
      grid-column: 1; grid-row: auto;
    }
  }
</style>
</head>
<body>

<header>
  <h1>⌂ Dashboard</h1>
  <span class="greeting" id="greeting">Good morning</span>
</header>

<div class="grid">

  <!-- CLOCK -->
  <div class="card clock-card">
    <div id="clock-time">00:00</div>
    <div id="clock-date">Loading...</div>
    <span id="clock-seconds">00s</span>
  </div>

  <!-- CALENDAR -->
  <div class="card calendar-card">
    <div class="cal-header">
      <h2 id="cal-month-label">June 2026</h2>
      <div class="cal-nav">
        <button id="cal-prev">‹</button>
        <button id="cal-next">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- TODO -->
  <div class="card todo-card">
    <div class="section-title">To-do</div>
    <div class="todo-input-row">
      <input type="text" id="todo-input" placeholder="Add a task…" />
      <button class="btn-add" id="todo-add">Add</button>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
  </div>

  <!-- NEWS -->
  <div class="card news-card">
    <div class="news-controls">
      <div class="news-tabs" id="news-tabs">
        <button class="news-tab active" data-topic="world">World</button>
        <button class="news-tab" data-topic="technology">Tech</button>
        <button class="news-tab" data-topic="science">Science</button>
        <button class="news-tab" data-topic="business">Business</button>
      </div>
      <button class="btn-refresh" id="news-refresh">↻ Refresh</button>
    </div>
    <div class="news-list" id="news-list">
      <div class="news-loading">Loading headlines…</div>
    </div>
  </div>

</div>

<script>
/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}`;
  document.getElementById('clock-seconds').textContent = `${s}s`;
  document.getElementById('clock-date').textContent = now.toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
  const hr = now.getHours();
  const g = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = g;
}
updateClock();
setInterval(updateClock, 1000);

/* ── CALENDAR ── */
let calYear, calMonth;
const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

function renderCal() {
  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month-label');
  grid.innerHTML = '';
  const monthNames = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  label.textContent = `${monthNames[calMonth]} ${calYear}`;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  days.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  for (let i = first - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = daysInPrev - i;
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    if (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear()) {
      el.classList.add('today');
    }
    grid.appendChild(el);
  }
  const total = first + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

document.getElementById('cal-prev').onclick = () => {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal();
};
document.getElementById('cal-next').onclick = () => {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal();
};
renderCal();

/* ── TODO ── */
let todos = JSON.parse(localStorage.getItem('dash-todos') || '[]');

function saveTodos() { localStorage.setItem('dash-todos', JSON.stringify(todos)); }

function renderTodos() {
  const list = document.getElementById('todo-list');
  list.innerHTML = '';
  todos.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'todo-item' + (t.done ? ' done' : '');
    li.innerHTML = `
      <input type="checkbox" ${t.done ? 'checked' : ''}>
      <span>${t.text}</span>
      <button class="todo-del" title="Delete">×</button>
    `;
    li.querySelector('input').onchange = () => { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); };
    li.querySelector('.todo-del').onclick = () => { todos.splice(i,1); saveTodos(); renderTodos(); };
    list.appendChild(li);
  });
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({ text, done: false });
  saveTodos(); renderTodos();
  input.value = '';
}

document.getElementById('todo-add').onclick = addTodo;
document.getElementById('todo-input').onkeydown = e => { if (e.key === 'Enter') addTodo(); };
renderTodos();

/* ── NEWS ── */
let currentTopic = 'world';

async function fetchNews(topic) {
  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="news-loading">Fetching headlines…</div>';
  try {
    // Using RSS2JSON free API with BBC RSS feeds
    const feeds = {
      world: 'http://feeds.bbci.co.uk/news/world/rss.xml',
      technology: 'http://feeds.bbci.co.uk/news/technology/rss.xml',
      science: 'http://feeds.bbci.co.uk/news/science_and_environment/rss.xml',
      business: 'http://feeds.bbci.co.uk/news/business/rss.xml'
    };
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feeds[topic])}&count=8`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.status !== 'ok' || !data.items?.length) throw new Error('No articles');

    list.innerHTML = '';
    data.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'news-item';
      const pubDate = new Date(item.pubDate);
      const ago = timeSince(pubDate);
      div.innerHTML = `
        <span class="news-source">BBC News</span>
        <span class="news-headline">${item.title}</span>
        <span class="news-time">${ago}</span>
      `;
      div.onclick = () => window.open(item.link, '_blank');
      list.appendChild(div);
    });
  } catch(e) {
    list.innerHTML = `
      <div class="news-loading">
        Couldn't load live news.<br>
        <small style="font-size:0.78rem; margin-top:6px; display:block;">
          Open <a href="https://www.bbc.co.uk/news" target="_blank" style="color:var(--accent)">BBC News</a> in a new tab,
          or allow cross-origin requests in your browser.
        </small>
      </div>`;
  }
}

function timeSince(date) {
  const s = Math.floor((new Date() - date) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

document.getElementById('news-tabs').querySelectorAll('.news-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.news-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTopic = btn.dataset.topic;
    fetchNews(currentTopic);
  };
});

document.getElementById('news-refresh').onclick = () => fetchNews(currentTopic);
fetchNews(currentTopic);
</script>
</body>
</html>
